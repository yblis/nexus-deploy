# ============================================================
# Nexus RMM — Production Deployment
# ============================================================
# Prérequis : Docker Engine 24+ et Docker Compose v2
#
# Installation :
#   1. cp .env.example .env
#   2. Éditer .env avec vos paramètres
#   3. docker compose pull
#   4. docker compose up -d
#
# Mise à jour :
#   docker compose pull && docker compose up -d
# ============================================================

services:
  # ──────────────────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────────────────
  nexus-db:
    image: postgres:16-alpine
    container_name: nexus-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - nexus-db-data:/var/lib/postgresql/data
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Backend API
  # ──────────────────────────────────────────────
  nexus-api:
    image: ghcr.io/yblis/nexus-api:${NEXUS_VERSION:-latest}
    container_name: nexus-api
    restart: unless-stopped
    environment:
      DB_HOST: nexus-db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: ${API_PORT:-8080}
      NEXUS_DOMAIN: ${NEXUS_DOMAIN}
      NEXUS_SERVER_IP: ${NEXUS_SERVER_IP:-}
    volumes:
      - nexus-binaries:/app/binaries
      - nexus-tools:/app/tools
      - nexus-branding:/app/branding
      - nexus-applications:/app/applications
      - nexus-uploads:/app/uploads
    tmpfs:
      - /tmp/nexus-chat:size=100M
    depends_on:
      nexus-db:
        condition: service_healthy
    networks:
      - nexus-net

  # ──────────────────────────────────────────────
  # Frontend Dashboard
  # ──────────────────────────────────────────────
  nexus-web:
    image: ghcr.io/yblis/nexus-web:${NEXUS_VERSION:-latest}
    container_name: nexus-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3333}:80"
    depends_on:
      - nexus-api
    networks:
      - nexus-net

volumes:
  nexus-db-data:
  nexus-binaries:
  nexus-tools:
  nexus-branding:
  nexus-applications:
  nexus-uploads:

networks:
  nexus-net:
    driver: bridge
